blueprint:
  name: P1 Netto Vermogen (3-fase saldering)
  description: >
    Berekent het netto vermogen dat je slimme meter gebruikt om te bepalen of
    je afneemt of teruglevert: de som van je 3 fasen (L1 + L2 + L3).
    Positief = afname van het net. Negatief = teruglevering aan het net.
    Dit is exact hoe de digitale/slimme meter momentaan saldeert over de fasen.
    Werkt met elke P1/DSMR-integratie die losse vermogen-sensoren per fase
    levert (HomeWizard P1, DSMR Reader, P1 Monitor, ADA P1 Meter, etc).
  domain: template
  source_url: https://raw.githubusercontent.com/imparatorr/0-op-de-meter/main/template/p1_netto_vermogen.yaml
  author: Apo
  homeassistant:
    min_version: "2024.6.0"
  input:
    fase_l1:
      name: Fase L1 vermogen sensor
      description: De sensor die het actuele vermogen op fase 1 toont (in Watt).
      selector:
        entity:
          domain: sensor
    fase_l2:
      name: Fase L2 vermogen sensor
      description: De sensor die het actuele vermogen op fase 2 toont (in Watt).
      selector:
        entity:
          domain: sensor
    fase_l3:
      name: Fase L3 vermogen sensor
      description: De sensor die het actuele vermogen op fase 3 toont (in Watt).
      selector:
        entity:
          domain: sensor
    sensor_naam:
      name: Naam van de nieuwe sensor
      description: Hoe de nieuwe sensor moet heten (bijv. "Netto Vermogen Meter").
      default: "Netto Vermogen Meter"
      selector:
        text: {}

variables:
  l1: !input fase_l1
  l2: !input fase_l2
  l3: !input fase_l3

sensor:
  - name: !input sensor_naam
    unique_id: p1_netto_vermogen
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    icon: mdi:transmission-tower
    state: >
      {% set a = states(l1) | float(0) %}
      {% set b = states(l2) | float(0) %}
      {% set c = states(l3) | float(0) %}
      {{ (a + b + c) | round(0) }}
    availability: >
      {{ states(l1) not in ['unknown','unavailable']
         and states(l2) not in ['unknown','unavailable']
         and states(l3) not in ['unknown','unavailable'] }}
